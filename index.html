<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Transcription · Deepgram</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #10101c;
    --surface2: #16162a;
    --border: #1f1f38;
    --accent: #00d9ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #4a5578;
    --live: #22c55e;
    --danger: #ef4444;
    --warn: #f59e0b;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(ellipse 70% 35% at 50% 0%, rgba(0,217,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 25% at 90% 90%, rgba(124,58,237,0.06) 0%, transparent 55%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }
  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,217,255,0.04), 0 32px 80px rgba(0,0,0,0.6);
  }

  /* API Key Bar */
  .api-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: rgba(0,217,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .api-bar label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .api-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-bar input:focus { border-color: var(--accent); }
  .api-key-status {
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--live);
    white-space: nowrap;
    display: none;
  }
  .api-key-status.visible { display: block; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 22px;
    border: none;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  #startBtn {
    background: linear-gradient(135deg, var(--live), #16a34a);
    color: #fff;
    box-shadow: 0 4px 18px rgba(34,197,94,0.28);
  }
  #startBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(34,197,94,0.42); }
  #startBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #stopBtn {
    background: linear-gradient(135deg, var(--danger), #b91c1c);
    color: #fff;
    box-shadow: 0 4px 18px rgba(239,68,68,0.28);
  }
  #stopBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(239,68,68,0.42); }
  #stopBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 9px 16px;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 50px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    transition: all 0.3s;
    margin-left: auto;
  }
  .status-pill.idle { color: var(--muted); }
  .status-pill.connecting { color: var(--warn); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.05); }
  .status-pill.live { color: var(--live); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
  .status-pill.stopped { color: var(--danger); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .status-pill.live .dot { animation: pulse 1.1s ease-in-out infinite; }
  .status-pill.connecting .dot { animation: pulse 0.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.25; transform:scale(0.65); }
  }

  /* Language selector */
  .lang-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
  }

  /* Transcript */
  .transcript-wrap {
    min-height: 360px;
    max-height: 500px;
    overflow-y: auto;
    padding: 28px;
    scroll-behavior: smooth;
    position: relative;
  }
  .transcript-wrap::-webkit-scrollbar { width: 4px; }
  .transcript-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .placeholder svg { opacity: 0.25; }
  .placeholder p { font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase; }

  #transcriptBox {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.98rem;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .interim-text {
    color: rgba(0,217,255,0.5);
    font-style: italic;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.01);
  }
  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 14px 20px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-value {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Error */
  .error-banner {
    width: 100%;
    max-width: 780px;
    margin-top: 14px;
    padding: 13px 18px;
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.22);
    border-radius: 12px;
    color: #fca5a5;
    font-size: 0.83rem;
    display: none;
    align-items: flex-start;
    gap: 10px;
  }
  .error-banner.visible { display: flex; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    transform: translateY(70px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Waveform animation when live */
  .waveform {
    display: none;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
    padding: 0 4px;
  }
  .waveform.active { display: flex; }
  .wave-bar {
    width: 3px;
    background: var(--live);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 18px; }
  }
</style>
</head>
<body>

<header>
  <h1>Live Transcription</h1>
  <p>Powered by Deepgram Nova-2 · Real-time streaming</p>
</header>

<div class="card">
  <!-- API Key -->
  <div class="api-bar">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your Deepgram API key…" />
    <span class="api-key-status" id="apiKeyStatus">✓ Key loaded</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="startBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Start
    </button>
    <button class="btn" id="stopBtn" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      Stop
    </button>

    <select class="lang-select" id="langSelect">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="pt">Portuguese</option>
    </select>

    <div class="waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="status-pill idle" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">Idle</span>
    </div>

    <button class="btn btn-ghost" id="clearBtn">Clear</button>
    <button class="btn btn-ghost" id="copyBtn">Copy</button>
  </div>

  <!-- Transcript -->
  <div class="transcript-wrap" id="transcriptWrap">
    <div class="placeholder" id="placeholder">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
      </svg>
      <p>Enter your API key, then press Start</p>
    </div>
    <div id="transcriptBox"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-label">Words</span>
      <span class="stat-value" id="wordCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Characters</span>
      <span class="stat-value" id="charCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Duration</span>
      <span class="stat-value" id="duration">0s</span>
    </div>
    <div class="stat">
      <span class="stat-label">Confidence</span>
      <span class="stat-value" id="confidence">—</span>
    </div>
  </div>
</div>

<div class="error-banner" id="errorBanner">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <div id="errorMsg"></div>
</div>

<div class="toast" id="toast">✓ Copied to clipboard</div>

<script>
  const apiKeyInput  = document.getElementById('apiKeyInput');
  const apiKeyStatus = document.getElementById('apiKeyStatus');
  const startBtn     = document.getElementById('startBtn');
  const stopBtn      = document.getElementById('stopBtn');
  const clearBtn     = document.getElementById('clearBtn');
  const copyBtn      = document.getElementById('copyBtn');
  const langSelect   = document.getElementById('langSelect');
  const statusPill   = document.getElementById('statusPill');
  const statusText   = document.getElementById('statusText');
  const transcriptBox= document.getElementById('transcriptBox');
  const placeholder  = document.getElementById('placeholder');
  const errorBanner  = document.getElementById('errorBanner');
  const errorMsg     = document.getElementById('errorMsg');
  const wordCountEl  = document.getElementById('wordCount');
  const charCountEl  = document.getElementById('charCount');
  const durationEl   = document.getElementById('duration');
  const confidenceEl = document.getElementById('confidence');
  const waveform     = document.getElementById('waveform');
  const toast        = document.getElementById('toast');
  const wrap         = document.getElementById('transcriptWrap');

  // Load API key from localStorage (never hardcode in source)
  const savedKey = localStorage.getItem('dg_api_key');
  if (savedKey) {
    apiKeyInput.value = savedKey;
    apiKeyStatus.classList.add('visible');
  }

  let socket = null;
  let mediaStream = null;
  let mediaRecorder = null;
  let finalTranscript = '';
  let startTime = null;
  let timerInterval = null;
  let lastConfidence = null;

  apiKeyInput.addEventListener('input', () => {
    const key = apiKeyInput.value.trim();
    apiKeyStatus.classList.toggle('visible', key.length > 10);
    if (key.length > 10) localStorage.setItem('dg_api_key', key);
    else localStorage.removeItem('dg_api_key');
  });

  function setStatus(state, label) {
    statusPill.className = 'status-pill ' + state;
    statusText.textContent = label;
    waveform.classList.toggle('active', state === 'live');
  }

  function showError(msg) {
    errorMsg.innerHTML = msg;
    errorBanner.classList.add('visible');
  }
  function hideError() { errorBanner.classList.remove('visible'); }

  function updateStats() {
    const text = finalTranscript.trim();
    wordCountEl.textContent = text ? text.split(/\s+/).length : 0;
    charCountEl.textContent = text.length;
    if (lastConfidence !== null) {
      confidenceEl.textContent = Math.round(lastConfidence * 100) + '%';
    }
  }

  function renderTranscript(interim = '') {
    const hasContent = finalTranscript || interim;
    placeholder.style.opacity = hasContent ? '0' : '1';
    transcriptBox.innerHTML =
      (finalTranscript ? escapeHtml(finalTranscript) : '') +
      (interim ? `<span class="interim-text">${escapeHtml(interim)}</span>` : '');
    wrap.scrollTop = wrap.scrollHeight;
    updateStats();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(secs / 60), s = secs % 60;
      durationEl.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
    }, 500);
  }

  function stopTimer() { clearInterval(timerInterval); }

  async function startTranscription() {
    hideError();
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { showError('<b>API key required.</b> Paste your Deepgram API key above.'); return; }

    setStatus('connecting', 'Connecting…');
    startBtn.disabled = true;

    try {
      // Get microphone
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      showError('<b>Microphone access denied.</b> Please allow microphone permissions and try again.');
      setStatus('idle', 'Idle');
      startBtn.disabled = false;
      return;
    }

    const lang = langSelect.value;

    // Open Deepgram WebSocket
    const wsUrl = `wss://api.deepgram.com/v1/listen?model=nova-2&language=${lang}&punctuate=true&interim_results=true&smart_format=true&utterance_end_ms=1000`;

    socket = new WebSocket(wsUrl, ['token', apiKey]);

    socket.onopen = () => {
      setStatus('live', 'Live');
      stopBtn.disabled = false;
      startTimer();

      // Stream mic audio
      mediaRecorder = new MediaRecorder(mediaStream, { mimeType: getSupportedMimeType() });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0 && socket && socket.readyState === WebSocket.OPEN) {
          socket.send(e.data);
        }
      };
      mediaRecorder.start(200); // send chunks every 200ms
    };

    socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type !== 'Results') return;

        const alt = data.channel?.alternatives?.[0];
        if (!alt) return;

        const text = alt.transcript;
        if (!text) return;

        if (typeof alt.confidence === 'number') lastConfidence = alt.confidence;

        if (data.is_final) {
          finalTranscript += text + ' ';
          renderTranscript('');
        } else {
          renderTranscript(text);
        }
      } catch(e) {}
    };

    socket.onerror = () => {
      showError('<b>WebSocket error.</b> Check your API key and internet connection.');
      stopTranscription();
    };

    socket.onclose = (e) => {
      if (e.code === 1008 || e.code === 4000) {
        showError('<b>Invalid API key.</b> Please check your Deepgram API key.');
      }
      if (stopBtn.disabled === false) stopTranscription();
    };
  }

  function stopTranscription() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (socket) {
      socket.onclose = null;
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'CloseStream' }));
        socket.close();
      }
      socket = null;
    }
    stopTimer();
    renderTranscript('');
    setStatus('stopped', 'Stopped');
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }

  function getSupportedMimeType() {
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg'];
    for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
    return '';
  }

  startBtn.addEventListener('click', startTranscription);
  stopBtn.addEventListener('click', stopTranscription);

  clearBtn.addEventListener('click', () => {
    finalTranscript = '';
    lastConfidence = null;
    renderTranscript('');
    durationEl.textContent = '0s';
    confidenceEl.textContent = '—';
    setStatus('idle', 'Idle');
  });

  copyBtn.addEventListener('click', () => {
    if (!finalTranscript.trim()) return;
    navigator.clipboard.writeText(finalTranscript.trim()).then(() => {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    });
  });
</script>
</body>
</html>
